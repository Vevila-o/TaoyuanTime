{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>活動編輯</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css" rel="stylesheet">
  <link rel="stylesheet" href="{% static 'css/dashboard.css' %}">
  <link rel="stylesheet" href="{% static 'css/activityAdd.css' %}">
</head>
<body>
    <!-- 左側導覽列 -->
  <div class="sidebar">

    <!-- Logo 區域 -->
    <div class="sidebar-logo">
      <h6>桃園市政府</h6>
      <small style='color:white'>活動資訊管理後台</small>
    </div>

    <!-- 選單 -->
    <div class="sidebar-menu mt-2">
      <a href="{% url 'dashboard' %}" >
        <i class="bi bi-speedometer2"></i> 儀表板
      </a>
      <a href="{% url 'activityList' %}" class="active">
        <i class="bi bi-calendar-event"></i> 活動管理
      </a>      
      <a href="{% url 'pushManagement' %}">
        <i class="bi bi-megaphone"></i> 推播管理
      </a>
      <a href="#">
        <i class="bi bi-people"></i> 使用者管理
      </a>
      <hr>
      <a href="#">
        <i class="bi bi-box-arrow-right"></i> 登出
      </a>
    </div>
  </div>

  <!--主要內容 -->
  <div class="main-content">

    <!--頂部標題 -->
    <div class="topbar">
      <h5><i class="bi bi-plus-pencil"></i> 活動編輯</h5>
      <a href="{% url 'activityList' %}" class='btn-back'> 返回活動列表</a>
    </div>

    <!--表單 -->
    <div class="form-card">


      <div class="form-row">
        <!--活動名稱-->        
        <div class="form-group">
          <label>活動名稱 <span class="required">*</span></label>
          <input type="text" class="form-input" placeholder="請輸入活動名稱">
        </div>
        
        <!--活動地區-->
        <div class="form-group">
          <label>地區 <span class="required">*</span></label>
          <select class="form-input">請選擇地區
            <option value="all">全部地區</option>
            <option value="Chungli">中壢區</option>
            <option value="Taoyuan">桃園區</option>
          </select>
        </div>
      </div>

      <!--活動說明-->
      <div class="form-group full-width">
        <label>活動說明</label>
        <textarea class="form-input" rows="4" placeholder="請輸入活動說明..."></textarea>
      </div>  
      
      <!--時間-->
      <div class="form-row">
        <div class="form-group">
          <label>開始時間 <span class="required">*</span></label>
          <input type="datetime-local" class="form-input">
        </div>

        <div class="form-group">
          <label>結束時間 <span class="required">*</span></label>
          <input type="datetime-local" class="form-input">
        </div>        
      </div>

      <!--活動類別 -->
      <div class="form-row">
        <div class="form-group">
          <label for="">活動類型</label>
          <select  class="form-input">
            <option value="">請選擇類型</option>
            <option value="">節慶</option>
          </select>
        </div>

        <!--費用類型 -->        
        <div class="form-group">
          <label for="">費用類型</label>
          <select  class="form-input">
            <option value="">請選擇類型</option>
            <option value="">免費</option>
          </select>
        </div>

      </div>
      
      <!--地點&狀態-->
      <div class="form-row">
        <div class="form-group">
          <label for="">地點</label>
          <input type="text" class="form-input" placeholder="請輸入地點名稱">
        </div>

        <div class="form-group">
          <label for="">狀態</label>
          <select  class="form-input">
            <option value="">上架</option>
            <option value="">草稿</option>
          </select>
        </div>

      </div>

      <!--表單操做按鈕-->
      <div class="form-action">
        <a href="{% url 'activityList' %}" class="btn-cancel">取消</a>
        <button class="btn-save">儲存活動</button>
      </div>

    </div>
  </div>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
