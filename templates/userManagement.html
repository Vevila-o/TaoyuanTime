{% load static %}
<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>使用者管理</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css" rel="stylesheet">
  <link rel="stylesheet" href="{% static 'css/dashboard.css' %}">
  <link rel="stylesheet" href="{% static 'css/userManagement.css' %}">
</head>
<body>

  <!-- 左側導覽列 -->
  <div class="sidebar">
    <div class="sidebar-logo">
      <h6>桃園市政府</h6>
      <small style='color:white'>活動資訊管理後台</small>
    </div>
    <div class="sidebar-menu mt-2">
      <a href="{% url 'dashboard' %}">
        <i class="bi bi-speedometer2"></i> 儀表板
      </a>
      <a href="{% url 'activityList' %}">
        <i class="bi bi-calendar-event"></i> 活動管理
      </a>
      <a href="{% url 'pushManagement' %}">
        <i class="bi bi-megaphone"></i> 推播管理
      </a>
      <a href="{% url 'userManagement' %}" class="active">
        <i class="bi bi-people"></i> 使用者管理
      </a>
      <hr>
      <a href="#">
        <i class="bi bi-box-arrow-right"></i> 登出
      </a>
    </div>
  </div>

  <!-- 主要內容區 -->
  <div class="main-content">

    <!-- 頂部標題列 -->
    <div class="topbar">
      <h5><i class="bi bi-people"></i> 使用者管理</h5>
    </div>

    <!-- 統計卡片 -->
    <div class="row g-3 mb-4">
      <div class="col-4">
        <div class="stat-card">
          <div class="label">總使用者數</div>
          <div class="number">1,243</div>
          <div class="trend up">↑ 較上月 +87</div>
        </div>
      </div>
      <div class="col-4">
        <div class="stat-card blue">
          <div class="label">開啟推播人數</div>
          <div class="number">1,102</div>
          <div class="trend muted">佔比 88.7%</div>
        </div>
      </div>
      <div class="col-4">
        <div class="stat-card orange">
          <div class="label">本月活躍用戶</div>
          <div class="number">876</div>
          <div class="trend muted">佔比 70.5%</div>
        </div>
      </div>
    </div>

    <!-- 使用者列表 -->
    <div class="table-card">
      <table class="user-table">
        <thead>
          <tr>
            <th>顯示名稱</th>
            <th>偏好地區</th>
            <th>偏好類型</th>
            <th>推播</th>
            <th>訂閱數</th>
            <th>最後活躍</th>
          </tr>
        </thead>
        <tbody>
          <tr>
            <td class="user-name">王小明</td>
            <td>中壢區</td>
            <td>親子、市集</td>
            <td><span class="push-on">✓</span></td>
            <td>3</td>
            <td>2026/05/22</td>
          </tr>
          <tr>
            <td class="user-name">李美華</td>
            <td>桃園區</td>
            <td>展覽、藝文</td>
            <td><span class="push-on">✓</span></td>
            <td>5</td>
            <td>2026/05/21</td>
          </tr>
          <tr>
            <td class="user-name">陳大偉</td>
            <td>大溪區</td>
            <td>節慶、戶外</td>
            <td><span class="push-off">✗</span></td>
            <td>1</td>
            <td>2026/05/18</td>
          </tr>
        </tbody>
      </table>
    </div>

  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
