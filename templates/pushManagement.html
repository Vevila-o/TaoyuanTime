{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>推播管理</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css" rel="stylesheet">
  <link rel="stylesheet" href="{% static 'css/dashboard.css' %}">
  <link rel="stylesheet" href="{% static 'css/pushManagement.css' %}">
</head>
<body>
    <!-- 左側導覽列 -->
  <div class="sidebar">

    <!-- Logo 區域 -->
    <div class="sidebar-logo">
      <h6>桃園市政府</h6>
      <small style='color:white'>活動資訊管理後台</small>
    </div>

    <!-- 選單 -->
    <div class="sidebar-menu mt-2">
      <a href="{% url 'dashboard' %}" >
        <i class="bi bi-speedometer2"></i> 儀表板
      </a>
      <a href="{% url 'activityList' %}" >
        <i class="bi bi-calendar-event"></i> 活動管理
      </a>      
      <a href="{% url 'pushManagement' %}" class="active">
        <i class="bi bi-megaphone"></i> 推播管理
      </a>
      <a href="{% url 'userManagement' %}">
        <i class="bi bi-people"></i> 使用者管理
      </a>
      <hr>
      <a href="#">
        <i class="bi bi-box-arrow-right"></i> 登出
      </a>
    </div>
  </div>

  <!--主要內容 -->
  <div class="main-content">


<!-- 頂部標題列 -->
    <div class="topbar">
      <h5><i class="bi bi-megaphone"></i> 推播管理</h5>
      <a href="#" class="btn-add">＋ 新增推播</a>
    </div>

    <!-- 統計卡片 -->
    <div class="row g-3 mb-4">
      <div class="col-4">
        <div class="stat-card">
          <div class="label">本月推播次數</div>
          <div class="number">15</div>
        </div>
      </div>
      <div class="col-4">
        <div class="stat-card green">
          <div class="label">平均成功率</div>
          <div class="number">98.2%</div>
        </div>
      </div>
      <div class="col-4">
        <div class="stat-card blue">
          <div class="label">待發送推播</div>
          <div class="number">3</div>
        </div>
      </div>
    </div>

    <!-- 推播列表 -->
    <div class="table-card">
      <table class="push-table">
        <thead>
          <tr>
            <th>推播標題</th>
            <th>類型</th>
            <th>預定發送時間</th>
            <th>狀態</th>
            <th>成功／失敗</th>
          </tr>
        </thead>
        <tbody>
          <tr>
            <td class="push-title">桃園地景藝術節開始提醒</td>
            <td>活動提醒</td>
            <td>2026/05/26 09:00</td>
            <td><span class="badge draft">待發送</span></td>
            <td class="muted">—</td>
          </tr>
          <tr>
            <td class="push-title">五月份新活動上架通知</td>
            <td>新活動推播</td>
            <td>2026/05/01 10:00</td>
            <td><span class="badge active">已發送</span></td>
            <td>1,230 / 13</td>
          </tr>
          <tr>
            <td class="push-title">中壢市集活動提醒</td>
            <td>手動推播</td>
            <td>2026/05/20 08:00</td>
            <td><span class="badge active">已發送</span></td>
            <td>987 / 5</td>
          </tr>
        </tbody>
      </table>
    </div>

  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
